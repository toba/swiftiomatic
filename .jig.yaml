nope:
    rules:
        - name: git-no-verify
          pattern: 'git\s+.*--no-verify'
          message: "--no-verify is never allowed — fix the issue that's failing the hook instead"
        - name: git-checkout-switch
          pattern: 'git\s+.*(checkout|switch|stash|restore)'
          message: "git checkout/switch not allowed — branch changes require user approval"
        - name: altering-jig
          pattern: 'jig.yaml'
          tools: ["Write", "Edit"]
          message: "cannot reconfigure jig directly — print desired config and user will edit"
        - name: altering-config
          pattern: 'swiftiomatic.json'
          tools: ["Write", "Edit"]
          message: "agent may not refer to the swiftiomatic.json file — just say 'configuration'"
        - name: bypassing-mcp
          pattern: 'swift (build|test)'
          message: "Use xc-mcp to build and test"
        - name: bypassing-mcp2
          pattern: 'xcrun xctest'
          message: "Use xc-mcp to build and test"
        - name: altering-project
          pattern: '\.(xcode|pbx)proj'
          tools: ["Write", "Edit"]
          message: "Project may only be modified using xc-mcp"
        - name: incompetent-agent
          pattern: '"\, timeout: \d{3,}\)'
          message: "Code is bad if anything takes that long. Must user shorter timeout."
companions:
    brew: toba/homebrew-tap
todo:
    path: .issues
    default_status: ready
    default_type: task
    sync:
        github:
            repo: toba/swiftiomatic
