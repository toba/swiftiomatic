name: Release

on:
  workflow_dispatch:
    inputs:
      tag:
        description: 'Tag to release (e.g. v0.29.2)'
        required: true

jobs:
  release:
    runs-on: macos-26

    steps:
    - uses: actions/checkout@v6
      with:
        ref: ${{ inputs.tag }}
        fetch-depth: 0

    - name: Validate tag
      run: |
        TAG="${{ inputs.tag }}"
        if ! git tag -l "$TAG" | grep -q .; then
          echo "::error::Tag $TAG does not exist"
          exit 1
        fi

    - name: Select Xcode version
      run: sudo xcode-select -s /Applications/Xcode_26.4.app/Contents/Developer

    - name: Run tests
      env:
        SWIFTIOMATIC_FULL_TESTS: "1"
      run: |
        swift test --disable-sandbox 2>&1 | tee test-output.log || true
        if grep -q '✘' test-output.log; then
          echo "::error::Test failures detected"
          grep '✘' test-output.log
          exit 1
        fi
        echo "All tests passed"

    - name: Build release binary
      run: swift build -c release --product sm --disable-sandbox

    - name: Create archive
      run: |
        TAG="${{ inputs.tag }}"
        mkdir -p dist
        cp .build/release/sm dist/
        cd dist && tar -czvf ../sm-${TAG}-arm64.tar.gz *

    - name: Generate SHA256
      run: |
        TAG="${{ inputs.tag }}"
        shasum -a 256 sm-${TAG}-arm64.tar.gz > sm-${TAG}-arm64.tar.gz.sha256

    - name: Generate release notes
      run: |
        PREV_TAG=$(git tag --sort=-v:refname | grep -E '^v[0-9]+\.[0-9]+\.[0-9]+$' | sed -n '2p')
        if [ -z "$PREV_TAG" ]; then
          NOTES=$(git log --pretty=format:"- %s" HEAD)
        else
          NOTES=$(git log --pretty=format:"- %s" ${PREV_TAG}..HEAD)
        fi
        echo "$NOTES" > release_notes.txt

    - name: Create GitHub Release
      uses: softprops/action-gh-release@v2
      with:
        tag_name: ${{ inputs.tag }}
        files: |
          sm-${{ inputs.tag }}-arm64.tar.gz
          sm-${{ inputs.tag }}-arm64.tar.gz.sha256
        body_path: release_notes.txt

    - name: Update Homebrew formula
      env:
        GH_TOKEN: ${{ secrets.HOMEBREW_TAP_TOKEN }}
      run: |
        TAG="${{ inputs.tag }}"
        VERSION="${TAG#v}"

        SHA=$(cat sm-${TAG}-arm64.tar.gz.sha256 | awk '{print $1}')

        git clone "https://x-access-token:${GH_TOKEN}@github.com/toba/homebrew-tap.git" tap
        cd tap

        cat > Formula/sm.rb <<FORMULA
class Sm < Formula
  desc "AST-based Swift code analysis CLI — lint, format, and detect anti-patterns"
  homepage "https://github.com/toba/swiftiomatic"
  url "https://github.com/toba/swiftiomatic/releases/download/${TAG}/sm-${TAG}-arm64.tar.gz"
  version "${VERSION}"
  sha256 "${SHA}"
  license "MIT"

  depends_on :macos => :tahoe
  depends_on arch: :arm64

  def install
    bin.install "sm"
  end

  test do
    assert_match "AST-based", shell_output("#{bin}/sm --help")
  end
end
FORMULA

        git rm -f Formula/swiftiomatic.rb 2>/dev/null || true

        git config user.name "github-actions[bot]"
        git config user.email "github-actions[bot]@users.noreply.github.com"
        git add Formula/sm.rb
        git commit -m "bump to ${VERSION}"
        git push
