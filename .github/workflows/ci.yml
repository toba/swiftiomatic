name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
  XCODE_VERSION: '26.4'

jobs:
  test:
    runs-on: macos-26

    steps:
    - uses: actions/checkout@v4

    - name: Select Xcode version
      run: sudo xcode-select -s /Applications/Xcode_${{ env.XCODE_VERSION }}.app/Contents/Developer

    - name: Cache SPM dependencies
      uses: actions/cache@v4
      with:
        path: .build
        key: spm-${{ runner.os }}-xcode${{ env.XCODE_VERSION }}-${{ hashFiles('Package.resolved') }}
        restore-keys: spm-${{ runner.os }}-xcode${{ env.XCODE_VERSION }}-

    - name: Resolve dependencies
      run: swift package resolve

    - name: Build
      run: swift build -c release --disable-sandbox

    - name: Test
      run: |
        swift test -c release --disable-sandbox 2>&1 | tee test-output.log || true
        if grep -q '✘' test-output.log; then
          echo "::error::Test failures detected"
          grep '✘' test-output.log
          exit 1
        fi
        echo "All tests passed"
