name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

env:
  XCODE_VERSION: '26.4'

jobs:
  test:
    runs-on: macos-26

    steps:
    - uses: actions/checkout@v6

    - name: Select Xcode version
      run: sudo xcode-select -s /Applications/Xcode_${{ env.XCODE_VERSION }}.app/Contents/Developer

    - name: Cache SPM build
      uses: actions/cache@v5
      with:
        path: .build
        key: spm-debug-${{ runner.os }}-xcode${{ env.XCODE_VERSION }}-${{ hashFiles('Package.resolved') }}
        restore-keys: spm-debug-${{ runner.os }}-xcode${{ env.XCODE_VERSION }}-
        save-always: true

    - name: Resolve dependencies
      run: swift package resolve

    - name: Test
      run: |
        swift test --parallel --disable-sandbox 2>&1 | tee test-output.log || true
        if grep -q '✘' test-output.log; then
          echo "::error::Test failures detected"
          grep '✘' test-output.log
          exit 1
        fi
        echo "All tests passed"
